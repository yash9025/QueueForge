version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: queueforge_db
    environment:
      POSTGRES_USER: queue_user
      POSTGRES_PASSWORD: queue_password
      POSTGRES_DB: queueforge
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U queue_user -d queueforge"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    command: npm run dev
    container_name: queueforge_api
    ports:
      - "3000:3000"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: queue_user
      DB_PASSWORD: queue_password
      DB_NAME: queueforge
    depends_on:
      postgres:
        condition: service_healthy

  reaper:
    build: ./backend
    command: npm run reaper
    container_name: queueforge_reaper
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: queue_user
      DB_PASSWORD: queue_password
      DB_NAME: queueforge
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build: ./backend
    command: npm run worker
    deploy:
      replicas: 3
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: queue_user
      DB_PASSWORD: queue_password
      DB_NAME: queueforge
    depends_on:
      postgres:
        condition: service_healthy

  demo-seeder:
    build: ./backend
    command: npx tsx src/demo-seeder.ts
    container_name: queueforge_seeder
    environment:
      API_URL: http://api:3000
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: secret123
      SEED_INTERVAL_MS: 4000
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

volumes:
  postgres_data:
