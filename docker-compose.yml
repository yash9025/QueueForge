version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: queueforge_db
    environment:
      POSTGRES_USER: queue_user
      POSTGRES_PASSWORD: queue_password
      POSTGRES_DB: queueforge
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
